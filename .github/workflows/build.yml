name: CI – Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore solution
        run: dotnet restore Khaos.Pipeline.Abstractions.sln

      - name: Build solution
        run: dotnet build Khaos.Pipeline.Abstractions.sln --configuration Release --no-restore

      - name: Test (unit)
        run: dotnet test Khaos.Pipeline.Abstractions.sln --configuration Release --no-build
